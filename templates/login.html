<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LabReserve</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏫 LabReserve</h1>
            <p>Sistema de Reserva de Laboratórios - FIAP</p>
        </div>
        
        <div class="content">
            <h2>Login</h2>
            
            {% if erro %}
                <div class="alert alert-error">{{ erro }}</div>
            {% endif %}
            
            <form method="POST">
                <div class="form-group">
                    <label>RM:</label>
                    <input type="text" name="rm" required>
                </div>
                <div class="form-group">
                    <label>Senha:</label>
                    <input type="password" name="senha" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Entrar</button>
            </form>
            
            <div class="link">
                <a href="{{ url_for('cadastro') }}">Ainda não tem cadastro? Cadastre-se</a>
            </div>
        </div>
        
        <div class="footer">
            <p>FIAP - Engenharia de Software © 2024</p>
        </div>
    </div>
</body>
</html>
