<!DOCTYPE html>
<html>
<head>
    <title>Login - Sistema de Reservas</title>
</head>
<body>
    <h2>Login do Sistema</h2>
    <form method="POST">
        <label>RM:</label>
        <input type="text" name="rm" required>
        <br><br>
        <label>Senha:</label>
        <input type="password" name="senha" required>
        <br><br>
        <button type="submit">Entrar</button>
        <a href="{{ url_for('cadastro') }}">Ainda não tenho cadastro</a>
        <p style="color:red;">{{ erro }}</p>
    </form>
</body>
</html>
