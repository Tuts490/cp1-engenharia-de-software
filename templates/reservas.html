<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fazer Reserva - LabReserve</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .container { max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #1e7e34; }
        .mensagem { padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        .sucesso { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .erro { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .voltar { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 5px; }
        .info { background-color: #e9ecef; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📅 Fazer Reserva de Laboratório</h2>
        
        <div class="info">
            <strong>⚠️ Importante:</strong> Use o formato <strong>AAAA-MM-DD HH:MM</strong><br>
            Exemplo: 2025-05-15 14:00 (dia 15 de maio de 2025 às 14h)
        </div>
        
        {% if mensagem %}
            <div class="mensagem sucesso">{{ mensagem }}</div>
        {% endif %}
        {% if erro %}
            <div class="mensagem erro">{{ erro }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label>Laboratório:</label>
                <select name="lab_id" required>
                    <option value="">Selecione um laboratório</option>
                    {% for lab in laboratorios %}
                        <option value="{{ lab.id }}">{{ lab.nome }} (Cap: {{ lab.capacidade }})</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>Data e Hora de Início:</label>
                <input type="text" name="data_inicio" placeholder="AAAA-MM-DD HH:MM" required>
            </div>
            
            <div class="form-group">
                <label>Data e Hora de Fim:</label>
                <input type="text" name="data_fim" placeholder="AAAA-MM-DD HH:MM" required>
            </div>
            
            <button type="submit">Confirmar Reserva</button>
        </form>
        
        <a href="{{ url_for('dashboard') }}" class="voltar">← Voltar ao Dashboard</a>
    </div>
</body>
</html>
